name: Update Wiki Content

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run update script
        run: node update_wiki.js

      - name: Commit and push changes
        run: |
          git config --global user.name "Wiki Bot"
          git config --global user.email "wiki-bot@github.com"
          git add data.json
          git commit -m "Auto-update wiki content from ovishekh.com" || echo "No changes to commit"
          git push
